name: CI/CD Demo

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build
      run: |
        echo "🔨 Building..."
        if [ $((RANDOM % 5)) -eq 0 ]; then
          echo "❌ Build failed!"
          exit 1
        fi

    - name: Test
      run: |
        echo "🧪 Testing..."
        if [ $((RANDOM % 5)) -eq 0 ]; then
          echo "❌ Test failed!"
          exit 1
        fi

    - name: Deploy Staging
      run: |
        echo "🚀 Deploying to Staging..."
        if [ $((RANDOM % 5)) -eq 0 ]; then
          echo "❌ Staging failed!"
          exit 1
        fi

    - name: Deploy Production
      run: |
        echo "🚀 Deploying to Production..."
        echo "✅ Done!"
