name: CI/CD Demo Full Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# =========================
# BUILD + TEST + STAGING
# =========================
  pipeline:
    runs-on: ubuntu-latest

    steps:

    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🔍 Detect Mode
      id: mode
      run: |
        if [ -f "TestSuccess" ]; then
          echo "mode=success" >> $GITHUB_OUTPUT
        else
          echo "mode=random" >> $GITHUB_OUTPUT
        fi

    # BUILD
    - name: 🔨 Auto Build
      run: |
        echo "🔨 Building project..."
        if [ "${{ steps.mode.outputs.mode }}" = "random" ]; then
          NUM=$((RANDOM % 4))
          echo "Random Number: $NUM"
          if [ $NUM -eq 0 ]; then
            echo "❌ Build thất bại!"
            exit 1
          fi
        fi
        echo "✅ Build thành công!"

    # TEST
    - name: 🧪 Auto Unit Test
      run: |
        echo "🧪 Running Unit Test..."
        if [ "${{ steps.mode.outputs.mode }}" = "random" ]; then
          NUM=$((RANDOM % 4))
          echo "Random Number: $NUM"
          if [ $NUM -eq 1 ]; then
            echo "❌ Test thất bại!"
            exit 1
          fi
        fi
        echo "✅ Test thành công!"

    # STAGING
    - name: 🚀 Auto Deploy Staging
      run: |
        echo "🚀 Deploying to Staging..."
        if [ "${{ steps.mode.outputs.mode }}" = "random" ]; then
          NUM=$((RANDOM % 4))
          echo "Random Number: $NUM"
          if [ $NUM -eq 2 ]; then
            echo "❌ Deploy Staging thất bại!"
            exit 1
          fi
        fi
        echo "✅ Deploy Staging thành công!"

    # FAIL NOTIFY
    - name: 📢 Notify Stop Pipeline
      if: failure()
      run: |
        echo "================================="
        echo "❌ PIPELINE ĐÃ DỪNG DO CÓ LỖI!"
        echo "================================="


# =========================
# MANUAL APPROVAL + PROD
# =========================
  deploy-production:
    needs: pipeline
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

    - name: 🚀 Deploy Production
      run: |
        echo "🚀 Deploying to Production..."

        NUM=$((RANDOM % 4))
        echo "Random Number: $NUM"

        if [ $NUM -eq 3 ]; then
          echo "❌ Deploy Production thất bại!"
          exit 1
        fi

        echo "✅ Deploy Production thành công!"

    - name: 🎉 System Stable
      run: |
        echo "================================="
        echo "✅ HỆ THỐNG PRODUCTION ỔN ĐỊNH!"
        echo "================================="
