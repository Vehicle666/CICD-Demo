name: CI/CD Demo Controlled

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: 🔍 Detect Mode
      id: mode
      run: |
        if [ -f "TestSuccess" ]; then
          echo "mode=success" >> $GITHUB_OUTPUT
        elif [ -f "TestRandom" ]; then
          echo "mode=random" >> $GITHUB_OUTPUT
        else
          echo "mode=random" >> $GITHUB_OUTPUT
        fi

    - name: 🔨 Build
      run: |
        echo "🔨 Building..."
        if [ "${{ steps.mode.outputs.mode }}" = "random" ]; then
          NUM=$((RANDOM % 4))
          echo "Random: $NUM"
          if [ $NUM -eq 0 ]; then
            echo "❌ Build failed!"
            exit 1
          fi
        fi
        echo "✅ Build success!"

    - name: 🧪 Test
      run: |
        echo "🧪 Testing..."
        if [ "${{ steps.mode.outputs.mode }}" = "random" ]; then
          NUM=$((RANDOM % 4))
          echo "Random: $NUM"
          if [ $NUM -eq 1 ]; then
            echo "❌ Test failed!"
            exit 1
          fi
        fi
        echo "✅ Test passed!"

    - name: 🚀 Deploy Staging
      run: |
        echo "🚀 Deploying to Staging..."
        if [ "${{ steps.mode.outputs.mode }}" = "random" ]; then
          NUM=$((RANDOM % 4))
          echo "Random: $NUM"
          if [ $NUM -eq 2 ]; then
            echo "❌ Staging failed!"
            exit 1
          fi
        fi
        echo "✅ Staging deployed!"

    - name: 🚀 Deploy Production
      run: |
        echo "🚀 Deploying to Production..."
        if [ "${{ steps.mode.outputs.mode }}" = "random" ]; then
          NUM=$((RANDOM % 4))
          echo "Random: $NUM"
          if [ $NUM -eq 3 ]; then
            echo "❌ Production failed!"
            exit 1
          fi
        fi
        echo "✅ Production deployed!"
